<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>PBL Group Builder</title>
  <style>
    /* Light theme only (no dark-mode switch — see spec/CLAUDE.md). */
    :root {
      /* JABSOM / UH Mānoa palette: white masthead, green accent rule. */
      --bg: #ffffff; --surface: #f4f7f5; --fg: #15201c; --muted: #4d5a54; --line: #d8e0dc;
      --brand: #0a7d4f; --brand-dark: #024731; --brand-fg: #ffffff;  /* slim green band */
      --accent: #00734a; --accent-bg: rgba(0,115,74,0.08);
      --gold: #f0b323;                                 /* UH Mānoa warm accent */
      --err: #c0392b; --err-bg: rgba(192,57,43,0.08);
      --warn: #b8860b; --warn-bg: rgba(184,134,11,0.10);
      --ok: #00734a;
      /* Design tokens (REDESIGN.md §3.1) */
      --space-1: 4px; --space-2: 8px; --space-3: 12px; --space-4: 16px; --space-5: 24px; --space-6: 32px;
      --radius-control: 7px; --radius-card: 8px; --radius-modal: 12px;
      --e1: 0 1px 3px rgba(0,0,0,0.06); --e2: 0 4px 14px rgba(0,0,0,0.10); --e3: 0 16px 48px rgba(0,0,0,0.28);
      --motion: 160ms;
    }
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      color: var(--fg); background: var(--bg); margin: 0;
      font-size: 16px; line-height: 1.6;
    }
    /* Accessibility baseline: visible keyboard focus, respect reduced motion. */
    :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 4px; }
    .iconbtn:focus-visible { outline-offset: -2px; }
    /* Tabs are flat, not buttons: square, inset focus that follows the tab edge. */
    .apptab:focus-visible { outline: 2px solid var(--accent); outline-offset: -3px; border-radius: 0; }
    @media (prefers-reduced-motion: reduce) {
      * { transition: none !important; animation: none !important; scroll-behavior: auto !important; }
    }
    /* Success/info toast */
    #toast { position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%) translateY(20px);
      background: var(--brand-dark); color: #fff; padding: 0.7rem 1.1rem; border-radius: 999px;
      box-shadow: var(--e2); font-size: 0.95rem; font-weight: 600; opacity: 0; pointer-events: none;
      transition: opacity var(--motion) ease-out, transform var(--motion) ease-out; z-index: 1100; }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    h2.section { font-size: 1.05rem; font-weight: 700; color: var(--brand-dark);
      margin: 1.6rem 0 0.2rem; letter-spacing: 0.01em; }
    h2.section + .section-sub { color: var(--muted); font-size: 0.92rem; margin: 0 0 0.4rem; }
    /* Light masthead: white surface, deep-green wordmark, single green accent rule. */
    header {
      padding: 0.9rem 1.5rem;
      background: var(--bg); color: var(--fg);
      border-bottom: 3px solid var(--brand);
      display: flex; align-items: center; gap: 0.85rem; flex-wrap: wrap;
    }
    .logo { flex: 0 0 auto; height: 46px; width: 46px; background: #fff;
            border: 1px solid var(--line); border-radius: 8px; padding: 3px; }
    .logo img { height: 100%; width: 100%; display: block; object-fit: contain; }
    .masthead { min-width: 0; }
    h1 { margin: 0; font-size: 1.3rem; letter-spacing: 0.01em; font-weight: 700; color: var(--brand-dark); }
    .tag { color: var(--muted); margin: 0.15rem 0 0; font-size: 0.9rem; }
    /* Icon transport bar (now lives in the tab row, right side) */
    .transport { display: flex; align-items: center; gap: 0.35rem; flex-wrap: wrap; }
    .iconbtn { width: 40px; height: 40px; display: inline-flex; align-items: center; justify-content: center;
      font-size: 1.15rem; padding: 0; border: 1px solid var(--line); background: var(--bg); color: var(--fg);
      border-radius: 8px; cursor: pointer; line-height: 1; }
    .iconbtn:hover { background: var(--accent-bg); }
    .iconbtn:disabled { opacity: 0.4; cursor: not-allowed; }
    .iconbtn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    .iconbtn.primary:hover:not(:disabled) { filter: brightness(1.08); }
    .tsep { width: 1px; height: 26px; background: var(--line); margin: 0 0.15rem; }
    /* Top-level app tabs */
    .apptabs { display: flex; align-items: center; gap: 0.3rem; padding: 0 1.5rem; flex-wrap: wrap;
      background: var(--surface); border-bottom: 1px solid var(--line); }
    .apptab { border: none; background: transparent; padding: 0.75rem 1.15rem; font: inherit;
      font-size: 1rem; font-weight: 600; color: var(--muted); cursor: pointer;
      border-bottom: 3px solid transparent; }
    .apptab:hover { color: var(--fg); }
    .apptab.active { color: var(--brand-dark); border-bottom-color: var(--brand); }
    .apptab-group { display: flex; gap: 0.3rem; }
    .apptabs-right { margin-left: auto; display: flex; align-items: center; gap: 0.6rem; flex-wrap: wrap; }
    .apptabs-right #loadedName { min-width: 0; max-width: 38vw;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    main { padding: 1.25rem 1.75rem 4rem; }
    /* Inline SVG icons sit on the text baseline; sized uniformly. */
    .icon { width: 18px; height: 18px; flex: 0 0 auto; vertical-align: -0.18em; }
    button .icon { vertical-align: -0.18em; }
    .iconbtn .icon { width: 20px; height: 20px; vertical-align: 0; }
    .toolbar {
      display: flex; flex-wrap: wrap; gap: 0.6rem; align-items: center;
      padding: 1rem 0; border-bottom: 1px solid var(--line); margin-bottom: 1.25rem;
    }
    button, .filebtn {
      font: inherit; font-size: 0.95rem; cursor: pointer; border: 1px solid var(--line);
      background: var(--bg); color: var(--fg); padding: 0.55rem 0.95rem;
      border-radius: 7px; transition: background 0.12s;
    }
    button:hover, .filebtn:hover { background: var(--accent-bg); }
    button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    button.primary:hover { filter: brightness(1.08); }
    button:disabled { opacity: 0.45; cursor: not-allowed; }
    .filebtn { display: inline-flex; align-items: center; gap: 0.4rem; }
    input[type=file] { display: none; }
    .note {
      border-left: 4px solid var(--accent); background: var(--accent-bg);
      padding: 0.7rem 1rem; border-radius: 6px; margin: 0 0 1.25rem; font-size: 0.95rem;
    }
    #validation { margin: 1.1rem 0; }
    .vsummary { display: flex; gap: 0.6rem; flex-wrap: wrap; margin-bottom: 0.6rem; font-weight: 600; }
    .pill { padding: 0.3rem 0.7rem; border-radius: 999px; font-size: 0.9rem; font-weight: 600; }
    .pill.ok { background: var(--accent-bg); color: var(--ok); }
    .pill.err { background: var(--err-bg); color: var(--err); }
    .pill.warn { background: var(--warn-bg); color: var(--warn); }
    .issue { padding: 0.55rem 0.8rem; border-radius: 6px; margin-bottom: 0.4rem; font-size: 0.92rem; }
    .issue.err { background: var(--err-bg); border-left: 3px solid var(--err); }
    .issue.warn { background: var(--warn-bg); border-left: 3px solid var(--warn); }
    .issue .loc { font-weight: 600; }
    button.loclink { font: inherit; font-weight: 600; color: var(--accent); background: none; border: none;
      padding: 0; cursor: pointer; text-decoration: underline; }
    button.loclink:hover { color: var(--brand-dark); }
    @keyframes rowflash { 0%, 100% { background: transparent; } 30% { background: rgba(240,179,35,0.35); } }
    tbody tr.flash td { animation: rowflash 1.4s ease-out; }
    .tabs { display: flex; gap: 0.3rem; flex-wrap: wrap; border-bottom: 1px solid var(--line); margin-top: 0.5rem; }
    .tab {
      padding: 0.55rem 1rem; border: 1px solid transparent; border-bottom: none;
      border-radius: 7px 7px 0 0; cursor: pointer; font-size: 0.95rem; color: var(--muted);
    }
    .tab:hover { color: var(--fg); background: var(--surface); }
    .tab.active { color: var(--brand-dark); border-color: var(--line); background: var(--bg);
      margin-bottom: -1px; font-weight: 700; box-shadow: inset 0 2px 0 var(--brand); }
    .tab .count { color: var(--muted); font-weight: 400; }
    /* Roster summary card + collapsible editor */
    .summary-card { display: flex; align-items: center; justify-content: space-between; gap: 1rem;
      flex-wrap: wrap; padding: 0.8rem 1rem; background: var(--surface); border: 1px solid var(--line);
      border-radius: var(--radius-card); margin-bottom: 1rem; }
    .summary-line { display: flex; align-items: center; gap: 0.6rem; flex-wrap: wrap; font-size: 0.95rem; }
    .summary-line .sc-n { color: var(--muted); } .summary-line .sc-n b { color: var(--fg); }
    button.ghost { border: 1px solid var(--line); background: var(--bg); font-weight: 600; }
    .filter-bar { display: flex; align-items: center; gap: 0.8rem; flex-wrap: wrap; padding: 0.2rem 0 0.7rem; }
    .filter-bar label { font-weight: 600; font-size: 0.92rem; }
    .filter-bar select { font: inherit; padding: 0.4rem 0.55rem; border: 1px solid var(--line);
      border-radius: 6px; background: var(--bg); color: var(--fg); }
    .sheet-wrap { overflow: auto; border: 1px solid var(--line); border-top: none; border-radius: 0 0 8px 8px; }
    /* Sticky first column keeps the key in view while scrolling wide sheets. */
    .sheet-wrap th:first-child, .sheet-wrap td:first-child { position: sticky; left: 0; background: var(--bg); z-index: 1; }
    .sheet-wrap thead th:first-child { background: var(--surface); z-index: 4; }
    .sheet-wrap tbody tr:hover td:first-child { background: var(--surface); }
    .sheet-wrap tr.badrow td:first-child { background: var(--err-bg); }
    table { border-collapse: collapse; width: 100%; font-size: 0.92rem; }
    th, td { text-align: left; padding: 0.5rem 0.75rem; border-bottom: 1px solid var(--line); white-space: nowrap; }
    th { background: var(--surface); position: sticky; top: 0; z-index: 3; font-weight: 700;
      color: var(--brand-dark); border-bottom: 2px solid var(--line); }
    tbody tr:hover td { background: var(--surface); }
    tr.badrow td { background: var(--err-bg); }
    .empty { color: var(--muted); padding: 1.5rem; text-align: center; font-size: 0.95rem; }
    .hidden { display: none; }
    code { background: rgba(127,127,127,0.18); padding: 0.05rem 0.3rem; border-radius: 3px; }

    /* --- Paste panel --- */
    #pastePanel { margin: 0 0 1rem; padding: 0.9rem; border: 1px solid var(--line); border-radius: 8px; }
    #pastePanel textarea {
      width: 100%; min-height: 120px; font: 0.82rem ui-monospace, Menlo, Consolas, monospace;
      padding: 0.5rem; border: 1px solid var(--line); border-radius: 6px; resize: vertical;
      background: var(--bg); color: var(--fg);
    }
    #pastePanel .prow { display: flex; gap: 0.5rem; align-items: center; margin-top: 0.6rem; }
    .hint { color: var(--muted); font-size: 0.88rem; margin: 0 0 0.5rem; }

    /* --- Inline editor --- */
    .sheet-tools { display: flex; gap: 0.6rem; align-items: center; padding: 0.6rem 0; }
    td.cell-edit { padding: 0; }
    input.cell {
      width: 100%; min-width: 7rem; font: inherit; font-size: 0.92rem; border: 0;
      background: transparent; color: var(--fg); padding: 0.5rem 0.7rem;
    }
    input.cell:focus { outline: 2px solid var(--accent); outline-offset: -2px; background: var(--accent-bg); }
    select.cell {
      width: 100%; min-width: 9rem; font: inherit; font-size: 0.92rem; border: 0;
      background: transparent; color: var(--fg); padding: 0.45rem 0.6rem; cursor: pointer;
    }
    select.cell:focus { outline: 2px solid var(--accent); outline-offset: -2px; background: var(--accent-bg); }
    /* Y/N toggle switch */
    .tog { position: relative; display: inline-block; width: 44px; height: 24px; vertical-align: middle; }
    .tog input { opacity: 0; width: 0; height: 0; }
    .tog .track { position: absolute; inset: 0; background: #c4ccc8; border-radius: 999px; transition: 0.15s; cursor: pointer; }
    .tog .track::before { content: ""; position: absolute; height: 18px; width: 18px; left: 3px; top: 3px;
      background: #fff; border-radius: 50%; transition: 0.15s; box-shadow: 0 1px 2px rgba(0,0,0,0.3); }
    .tog input:checked + .track { background: var(--accent); }
    .tog input:checked + .track::before { transform: translateX(20px); }
    td.actions-cell { text-align: center; white-space: nowrap; }
    th.actions-col { width: 1%; }
    button.rowdel { border: none; background: transparent; color: var(--err); cursor: pointer;
      line-height: 1; padding: 0.3rem; border-radius: 5px; display: inline-flex; align-items: center; }
    button.rowdel .icon { width: 17px; height: 17px; }
    button.rowdel:hover { background: var(--err-bg); }

    /* --- Solver: controls, scorecard, board --- */
    #solver { margin-top: 0.5rem; }
    .solvebar { display: flex; flex-wrap: wrap; gap: 1rem; align-items: center;
      padding: 0.9rem 1rem; background: var(--surface); border: 1px solid var(--line);
      border-radius: 8px; }
    .solvebar label { font-size: 0.95rem; font-weight: 600; }
    .solvebar select { font: inherit; font-size: 0.95rem; padding: 0.5rem 0.6rem;
      border: 1px solid var(--line); border-radius: 6px; background: var(--bg); color: var(--fg); }
    .weights { font-size: 0.92rem; }
    .weights summary { cursor: pointer; color: var(--accent); font-weight: 600; }
    .wgrid { display: grid; grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 0.9rem 1.6rem; margin: 0.8rem 0 0.2rem; }
    .wrow { display: flex; flex-direction: column; gap: 0.3rem; }
    .wrow .wlab { display: flex; justify-content: space-between; font-size: 0.88rem; color: var(--muted); }
    .wrow .wlab b { color: var(--fg); }
    .wrow input[type=range] { width: 100%; height: 6px; accent-color: var(--accent); }
    #scorecard { margin: 1.2rem 0; }
    .sc-hard { display: flex; flex-wrap: wrap; gap: 0.45rem; margin-bottom: 0.7rem; }
    .issue.ok-note { background: var(--accent-bg); border-left: 3px solid var(--ok); margin-top: 0.6rem; }
    .issue.err, .issue.warn { margin-top: 0.6rem; }
    /* Soft-metric status cards */
    .sc-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 0.7rem; }
    .sc-card { border: 1px solid var(--line); border-radius: var(--radius-card); padding: 0.7rem 0.85rem;
      background: var(--surface); }
    .sc-card.good { border-color: rgba(0,115,74,0.4); background: var(--accent-bg); }
    .sc-val { font-size: 1.5rem; font-weight: 700; line-height: 1; color: var(--fg); font-variant-numeric: tabular-nums; }
    .sc-card.good .sc-val { color: var(--ok); }
    .sc-lab { font-size: 0.82rem; color: var(--muted); margin-top: 0.25rem; }
    .board { display: flex; gap: 0.9rem; overflow-x: auto; padding-bottom: 0.7rem; align-items: flex-start; }
    .gcol { flex: 0 0 230px; border: 1px solid var(--line); border-top: 3px solid var(--brand); border-radius: 10px;
      background: var(--bg); display: flex; flex-direction: column; overflow: hidden; box-shadow: var(--e1); }
    .gcol.over { border-color: var(--err); border-top-color: var(--err); }
    .ghead { padding: 0.7rem 0.8rem; border-bottom: 1px solid var(--line); background: var(--surface); }
    .ghead .gid { font-weight: 700; font-size: 1rem; color: var(--brand-dark); }
    .ghead .gmeta { font-size: 0.82rem; color: var(--muted); }
    .ghead .gtutors { font-size: 0.88rem; color: var(--accent); font-weight: 600; margin-top: 0.15rem; }
    .gbody { padding: 0.55rem; display: flex; flex-direction: column; gap: 0.4rem; min-height: 48px; }
    .chip { padding: 0.45rem 0.6rem; border-radius: 7px; background: var(--surface);
      border: 1px solid var(--line); font-size: 0.9rem; cursor: grab; transition: box-shadow var(--motion), border-color var(--motion); }
    .chip:hover { border-color: var(--accent); box-shadow: var(--e1); }
    .chip:active { cursor: grabbing; }
    .chip.dragging { opacity: 0.5; }
    .chip.flag { border-color: var(--err); background: var(--err-bg); }
    .chip.warn { border-color: var(--warn); background: var(--warn-bg); }
    .chip.locked { border-color: var(--accent); box-shadow: inset 3px 0 0 var(--accent); }
    .chip .chip-row { display: flex; align-items: center; justify-content: space-between; gap: 0.4rem; }
    .chip-actions { display: flex; align-items: center; gap: 0.2rem; flex: 0 0 auto; }
    .movesel { font-size: 0.72rem; border: 1px solid var(--line); border-radius: 5px; background: var(--bg);
      color: var(--muted); padding: 0.1rem 0.2rem; max-width: 72px; cursor: pointer; }
    .chip .cname { font-weight: 600; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .chip .ctags { color: var(--muted); font-size: 0.8rem; margin-top: 0.1rem; }
    .lockbtn { border: none; background: transparent; cursor: pointer; padding: 0.1rem; line-height: 1;
      display: inline-flex; color: var(--muted); opacity: 0.7; }
    .lockbtn .icon { width: 16px; height: 16px; }
    .lockbtn:hover { opacity: 1; color: var(--fg); background: transparent; }
    .chip.locked .lockbtn { opacity: 1; color: var(--accent); }
    .gcol.dragover { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-bg); }
    .gcol.dragover .gbody { background: var(--accent-bg); }
    .gcount { font-size: 0.82rem; color: var(--muted); padding: 0 0.8rem 0.6rem; }
    .board-actions { display: flex; flex-wrap: wrap; gap: 0.6rem; align-items: center; margin: 0.2rem 0 0.9rem; }
    .board-actions .hint { flex: 1 1 280px; }

    /* --- In-app confirmation modal --- */
    .modal-overlay { position: fixed; inset: 0; background: rgba(10, 20, 16, 0.5);
      display: flex; align-items: center; justify-content: center; padding: 1rem; z-index: 1000; }
    .modal-overlay.hidden { display: none; }   /* must beat .modal-overlay (later source order) */
    .modal-card { background: var(--bg); border-radius: 12px; padding: 1.4rem 1.5rem 1.2rem;
      max-width: 420px; width: 100%; box-shadow: 0 16px 48px rgba(0,0,0,0.28); }
    .modal-title { margin: 0 0 0.5rem; font-size: 1.1rem; color: var(--brand-dark); }
    .modal-msg { margin: 0 0 1.2rem; color: var(--fg); }
    .modal-actions { display: flex; justify-content: flex-end; gap: 0.6rem; }
    button.danger { background: var(--err); border-color: var(--err); color: #fff; }
    button.danger:hover { filter: brightness(1.08); background: var(--err); }

    /* --- Printable / PDF roster (hidden on screen, shown only when printing) --- */
    .print-only { display: none; }
    @media print {
      header, main > *:not(#printRoster) { display: none !important; }
      #printRoster { display: block !important; color: #000; }
      #printRoster h1 { font-size: 18pt; margin: 0 0 0.5rem; }
      #printRoster .rgroup { page-break-inside: avoid; break-inside: avoid; margin: 0 0 14pt; }
      #printRoster h2 { font-size: 12.5pt; margin: 0 0 4pt; border-bottom: 1.5pt solid #000; padding-bottom: 2pt; }
      #printRoster .rcount { font-weight: 400; color: #444; }
      #printRoster ol { margin: 4pt 0 0; padding-left: 22pt; }
      #printRoster li { font-size: 11pt; margin: 1.5pt 0; }
      #printRoster .rtags { color: #555; font-size: 9.5pt; }
    }

    /* --- Responsive --- */
    @media (max-width: 720px) {
      header { padding: 0.7rem 1rem; }
      .apptabs { padding: 0 1rem; }
      main { padding: 1rem 1rem 4rem; }
      h1 { font-size: 1.15rem; }
      .apptab { padding: 0.65rem 0.8rem; }
      .gcol { flex-basis: 80vw; }
      .solvebar { gap: 0.7rem; }
      .apptabs-right #loadedName { display: none; }   /* keep the tab row compact on phones */
    }
</head>
<body>
  <header>
    <!-- LOGO: referenced relatively (works on GitHub Pages and via file://); build.mjs
         inlines it as a data URI for the single self-contained file. Never a remote URL. -->
    <span class="logo">
      <img src="vendor/jabsom-logo.svg" alt="John A. Burns School of Medicine">
    </span>
    <div class="masthead">
      <h1>PBL Group Builder</h1>
      <p class="tag">JABSOM Problem-Based Learning group assignment &mdash; MD1&ndash;MD7</p>
    </div>
  </header>

  <nav class="apptabs" aria-label="Views and actions">
    <div class="apptab-group" id="appTabs" role="tablist" aria-label="Views">
      <button class="apptab active" data-view="roster" role="tab" aria-selected="true">Roster</button>
      <button class="apptab" data-view="groups" role="tab" aria-selected="false">Groups</button>
    </div>
    <div class="apptabs-right">
      <span id="loadedName" class="tag"></span>
      <div class="transport" role="toolbar" aria-label="Actions">
      <button id="btnExample" class="iconbtn" title="Load example data" aria-label="Load example data">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 3v4M3 5h4"/><path d="M18 14v4M16 16h4"/><path d="M12 5l2.4 5.6L20 13l-5.6 2.4L12 21l-2.4-5.6L4 13l5.6-2.4z"/></svg>
      </button>
      <label class="iconbtn" title="Open workbook (.xlsx / .csv)" aria-label="Open workbook">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 7a1 1 0 0 1 1-1h4l2 2h8a1 1 0 0 1 1 1v8a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1z"/></svg>
        <input type="file" id="fileInput" accept=".xlsx,.xls,.csv">
      </label>
      <button id="btnPaste" class="iconbtn" title="Paste rows from Excel / Google Sheets" aria-label="Paste rows">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="8" y="3" width="8" height="4" rx="1"/><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/></svg>
      </button>
      <button id="btnTemplate" class="iconbtn" title="Download blank template" aria-label="Download blank template">
