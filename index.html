  <script src="vendor/xlsx.full.min.js"></script>
  <script>
  /* =========================================================================
     PBL Group Builder — Phase 1: data + validation + FERPA-safe round-trip.
     Pure client-side. The workbook is the source of truth (see spec §2).
     ========================================================================= */

  // ---- Schema: the data contract (spec §2) -------------------------------
  // Each sheet lists required columns; validation keys off these.
  const SCHEMA = {
    Students: { key: 'StudentID',
      required: ['StudentID', 'Name', 'Gender', 'Imi', 'Resident', 'LCMentorID', 'ScheduleTag', 'Cohort'] },
    Tutors:   { key: 'TutorID',
      required: ['TutorID', 'Name', 'Availability', 'MaxStudents', 'CoTutorOK'] },
    Conflicts:{ key: null,
      required: ['TypeA_ID', 'TypeB_ID', 'Kind', 'Reason'] },
    Groups:   { key: null,
      required: ['Unit', 'GroupID', 'TimeSlot', 'TutorIDs', 'Cohort'] },
    // NOTE: Excel reserves the worksheet name "History" (change-tracking),
    // so the spec's "History" sheet is stored as "PBLHistory" — same columns.
    PBLHistory: { key: null,
      required: ['Unit', 'StudentID', 'GroupID', 'TutorID'] },
  };
  const SHEET_ORDER = ['Students', 'Tutors', 'Conflicts', 'Groups', 'PBLHistory'];
  const UNITS = ['MD1','MD2','MD3','MD4','MD5','MD6','MD7'];
  const YN = new Set(['Y', 'N', '']);
  // Columns rendered as a Y/N toggle in the inline editor.
  const BOOL_COLS = new Set(['Imi', 'Resident', 'CoTutorOK']);

  // ScheduleTag preset menu (spec §2: ImiGA, HOMEmgr, Exception:Day-Slot, or blank).
  // Rendered as a dropdown in the editor instead of free text; "Custom…" falls back
  // to a text box for anything not in this list.
  const SCHED_DAYS = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri'];
  const SCHED_SLOTS = ['AM', 'PM'];
  const SCHEDULE_TAGS = ['', 'ImiGA', 'HOMEmgr',
    ...SCHED_DAYS.flatMap(d => SCHED_SLOTS.map(s => `Exception:${d}-${s}`))];
  const CUSTOM_TAG = '__custom__';

  // Inline SVG icons (no emoji — vector, themeable via currentColor) for dynamic controls.
  const _svg = (inner, fill) => `<svg class="icon" viewBox="0 0 24 24" ${fill ? 'fill="currentColor"' :
    'fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"'} aria-hidden="true">${inner}</svg>`;
  const ICONS = {
    lock:   _svg('<rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/>'),
    unlock: _svg('<rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V8a4 4 0 0 1 7.5-1.8"/>'),
    trash:  _svg('<path d="M4 7h16"/><path d="M9 7V5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2"/><path d="M6 7l1 13a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2l1-13"/>'),
  };

  // ---- Display labels --------------------------------------------------
  // The workbook round-trip needs the exact canonical keys/values, so we keep
  // those in the data and only map to plain-English titles when rendering.
  const SHEET_LABELS = {
    Students: 'Students', Tutors: 'Tutors', Conflicts: 'Conflicts',
    Groups: 'Groups', PBLHistory: 'History',
  };
  const COLUMN_LABELS = {
    StudentID: 'Student ID', TutorID: 'Tutor ID', Name: 'Name', Gender: 'Gender',
    Imi: 'Imi Hoʻōla', Resident: 'Hawaiʻi Resident', LCMentorID: 'LC Mentor',
    ScheduleTag: 'Schedule', Availability: 'Availability', MaxStudents: 'Max Students',
    CoTutorOK: 'Co-Tutor OK', TypeA_ID: 'Person A', TypeB_ID: 'Person B',
    Kind: 'Conflict Type', Reason: 'Reason', Unit: 'Unit', GroupID: 'Group',
    TimeSlot: 'Time Slot', TutorIDs: 'Tutor(s)', Cohort: 'Class / Cohort',
  };
  const FULL_DAYS = { Mon: 'Monday', Tue: 'Tuesday', Wed: 'Wednesday', Thu: 'Thursday', Fri: 'Friday' };
  const TAG_LABELS = { '': '— none —', ImiGA: 'Imi Hoʻōla GA', HOMEmgr: 'HOME Project Manager' };
  const GENDER_LABELS = { F: 'Female', M: 'Male', X: 'Other' };

  const sheetLabel = (s) => SHEET_LABELS[s] || s;
  const colLabel = (c) => COLUMN_LABELS[c] || c;
  const genderLabel = (g) => GENDER_LABELS[up(g)] || norm(g);
  function tagLabel(tag) {
    const t = norm(tag);
    if (t in TAG_LABELS) return TAG_LABELS[t];
    const m = /^Exception:(\w+)-(AM|PM)$/i.exec(t);
    if (m) return `Exception — ${FULL_DAYS[m[1]] || m[1]} (${m[2].toUpperCase()})`;
    return t;
  }

  // ---- Pick-lists: keep solver input sanitized + human-readable -----------
  // Static enums (canonical value stored; human label shown), scoped per sheet
  // so identifier columns like Tutors.TutorID stay free text.
  const GENDER_OPTS   = [{ value:'F', label:'Female' }, { value:'M', label:'Male' }, { value:'X', label:'Other / Nonbinary' }];
  const AVAIL_OPTS    = [{ value:'AM', label:'Mornings (AM)' }, { value:'PM', label:'Afternoons (PM)' }, { value:'AM,PM', label:'Mornings & Afternoons (AM, PM)' }];
  const MAXSTU_OPTS   = [4,5,6,7,8].map(n => ({ value:String(n), label:`${n} students` }));
  const KIND_OPTS     = [{ value:'student-student', label:'Student ↔ Student' }, { value:'tutor-student', label:'Tutor ↔ Student' }];
  const TIMESLOT_OPTS = [{ value:'AM', label:'Morning (AM)' }, { value:'PM', label:'Afternoon (PM)' }];
  const UNIT_OPTS     = UNITS.map(u => ({ value:u, label:u }));
  // Per-(sheet, column) field kinds: `enum` = static list, `ref` = pick a record by name.
  const FIELD_KINDS = {
    Students:   { Gender: { enum: GENDER_OPTS }, LCMentorID: { ref: 'tutors' } },
    Tutors:     { Availability: { enum: AVAIL_OPTS }, MaxStudents: { enum: MAXSTU_OPTS } },
    Conflicts:  { Kind: { enum: KIND_OPTS }, TypeA_ID: { ref: 'people' }, TypeB_ID: { ref: 'people' } },
    Groups:     { Unit: { enum: UNIT_OPTS }, TimeSlot: { enum: TIMESLOT_OPTS } },
    PBLHistory: { Unit: { enum: UNIT_OPTS }, StudentID: { ref: 'students' }, TutorID: { ref: 'tutors' } },
  };

  const optionTag = (value, label, selected) =>
    `<option value="${escapeAttr(value)}"${selected ? ' selected' : ''}>${escapeHtml(label)}</option>`;
  const idLabel = (id, nm) => (nm ? `${nm} (${id})` : id);

  function enumOptions(opts, v) {
    let html = optionTag('', '— choose —', v === '');
    html += opts.map(o => optionTag(o.value, o.label, o.value === v)).join('');
    if (v !== '' && !opts.some(o => o.value === v)) html += optionTag(v, `${v} (?)`, true); // keep unknown visible
    return html;
  }
  function refOptions(kind, v) {
    const peopleGroup = (label, rows, idK) => rows.length
      ? `<optgroup label="${escapeHtml(label)}">` +
        rows.map(r => optionTag(norm(r[idK]), idLabel(norm(r[idK]), norm(r.Name)), norm(r[idK]) === v)).join('') +
        `</optgroup>` : '';
    if (kind === 'people') {
      let html = optionTag('', '— none —', v === '');
      html += peopleGroup('Students', workbook.Students || [], 'StudentID');
      html += peopleGroup('Tutors',   workbook.Tutors   || [], 'TutorID');
      const known = [...(workbook.Students || []).map(r => norm(r.StudentID)),
                     ...(workbook.Tutors   || []).map(r => norm(r.TutorID))];
      if (v !== '' && !known.includes(v)) html += optionTag(v, `${v} (unknown)`, true);
      return html;
    }
    const rows = kind === 'tutors' ? (workbook.Tutors || []) : (workbook.Students || []);
    const idK = kind === 'tutors' ? 'TutorID' : 'StudentID';
    let html = optionTag('', '— none —', v === '');
    html += rows.map(r => optionTag(norm(r[idK]), idLabel(norm(r[idK]), norm(r.Name)), norm(r[idK]) === v)).join('');
    if (v !== '' && !rows.some(r => norm(r[idK]) === v)) html += optionTag(v, `${v} (unknown)`, true);
    return html;
  }
  const pickCell = (i, c, optionHTML) =>
    `<td class="cell-edit"><select class="cell pick" data-r="${i}" data-c="${c}">${optionHTML}</select></td>`;

  // Template example rows — illustrate format; names are obviously-fake medical puns
  // and the data is constructed so the solver finds a clean (0-violation) assignment.
  const TEMPLATE = {
    Students: [
      { StudentID:'AB01', Name:'Anna Tomy',    Gender:'F', Imi:'N', Resident:'Y', LCMentorID:'T01', ScheduleTag:'',                Cohort:'Class of 2028' },
      { StudentID:'CD02', Name:'Hema Globin',  Gender:'M', Imi:'Y', Resident:'Y', LCMentorID:'T02', ScheduleTag:'',                Cohort:'Class of 2028' },
      { StudentID:'EF03', Name:'Sara Tonin',   Gender:'F', Imi:'N', Resident:'N', LCMentorID:'T01', ScheduleTag:'',                Cohort:'Class of 2028' },
      { StudentID:'GH04', Name:'Gil Bladder',  Gender:'M', Imi:'N', Resident:'Y', LCMentorID:'T03', ScheduleTag:'',                Cohort:'Class of 2028' },
      { StudentID:'IJ05', Name:'Vena Cava',    Gender:'F', Imi:'N', Resident:'N', LCMentorID:'T01', ScheduleTag:'Exception:Tue-AM', Cohort:'Class of 2028' },
      { StudentID:'KL06', Name:'Otto Immune',  Gender:'M', Imi:'Y', Resident:'Y', LCMentorID:'T03', ScheduleTag:'ImiGA',           Cohort:'Class of 2028' },
    ],
    Tutors: [
      { TutorID:'T01', Name:'Dr. Cara Diak',     Availability:'AM,PM', MaxStudents:6, CoTutorOK:'Y' },
      { TutorID:'T02', Name:'Dr. Anne Esthesia', Availability:'AM',    MaxStudents:6, CoTutorOK:'N' },
      { TutorID:'T03', Name:'Dr. Hugh Morr',     Availability:'PM',    MaxStudents:5, CoTutorOK:'Y' },
    ],
    Conflicts: [
      { TypeA_ID:'AB01', TypeB_ID:'CD02', Kind:'student-student', Reason:'prior issue' },
      { TypeA_ID:'T02',  TypeB_ID:'EF03', Kind:'tutor-student',   Reason:'family' },
    ],
    Groups: [
      { Unit:'MD1', GroupID:'G1', TimeSlot:'AM', TutorIDs:'T02', Cohort:'Class of 2028' },
      { Unit:'MD1', GroupID:'G2', TimeSlot:'PM', TutorIDs:'T03', Cohort:'Class of 2028' },
    ],
    PBLHistory: [
      { Unit:'MD1', StudentID:'AB01', GroupID:'G1', TutorID:'T02' },
    ],
  };

  // A larger, realistic-scale demo cohort (~80 students, 14 tutors/groups for MD2,
  // a prior MD1 history to exercise repeat-avoidance, sparse conflicts + a few
  // schedule exceptions). Deterministic and built with enough slack to solve cleanly.
  // Names are obviously-fake medical puns (first-pun + suffix-pun combos).
  function makeExample() {
    const firsts = ['Anna','Hema','Sara','Gil','Vena','Otto','Polly','Sy','Mel','Cam',
                    'Val','Hugh','Bronca','Lymph','Sela','Glanda','Rena','Cysta','Derma','Neura'];
    const lasts  = ['Tomy','Globin','Tonin','Bladder','Cava','Immune','Mer','Atica','Noma','Plasm',
                    'Itis','Ostomy','Phasia','Trophy','Lysis','Edema','Sclera','Genic','Pathy','Stenia'];
    const G = 14, N = 80;
    const tid = n => 'T' + String(n).padStart(2, '0');
    const sid = n => 'S' + String(n).padStart(2, '0');
    const gid = n => 'G' + n;

    const COHORT = 'Class of 2028';
    const Tutors = [];
    for (let t = 1; t <= G; t++)
      Tutors.push({ TutorID: tid(t), Name: `Dr. ${firsts[(t * 3) % firsts.length]} ${lasts[(t * 5) % lasts.length]}`,
                    Availability: t % 2 ? 'AM' : 'PM', MaxStudents: 6, CoTutorOK: t % 3 ? 'Y' : 'N' });
    // This unit's slots (MD2): groups alternate AM/PM, tutor g covers group g.
    const Groups = [];
    for (let g = 1; g <= G; g++)
      Groups.push({ Unit: 'MD2', GroupID: gid(g), TimeSlot: g % 2 ? 'AM' : 'PM', TutorIDs: tid(g), Cohort: COHORT });

    const Students = [], PBLHistory = [];
    for (let i = 0; i < N; i++) {
      const id = sid(i + 1);
      let tag = '';
      if (i % 23 === 0 && i) tag = 'Exception:Tue-AM';   // a few AM-bound students
      else if (i % 19 === 0 && i) tag = 'ImiGA';          // informational
      Students.push({
        StudentID: id, Name: `${firsts[i % firsts.length]} ${lasts[(i * 7 + 3) % lasts.length]}`,
        Gender: i % 2 ? 'M' : 'F',
        Imi: i % 9 === 0 ? 'Y' : 'N',
        Resident: i % 4 === 0 ? 'N' : 'Y',
        LCMentorID: tid((i % G) + 1),
        ScheduleTag: tag,
        Cohort: COHORT,
      });
      // Prior unit (MD1): a different tutor than their LC mentor, to drive repeat-avoidance.
      PBLHistory.push({ Unit: 'MD1', StudentID: id, GroupID: gid(((i + 5) % G) + 1), TutorID: tid(((i + 5) % G) + 1) });
    }
    const Conflicts = [
      { TypeA_ID: sid(1), TypeB_ID: sid(2),  Kind: 'student-student', Reason: 'prior issue' },
      { TypeA_ID: sid(3), TypeB_ID: sid(4),  Kind: 'student-student', Reason: 'roommates' },
      { TypeA_ID: tid(2), TypeB_ID: sid(6),  Kind: 'tutor-student',   Reason: 'family' },
    ];
    return { Students, Tutors, Conflicts, Groups, PBLHistory };
  }

  // ---- State -------------------------------------------------------------
  let workbook = null;       // { Students:[...], Tutors:[...], ... } row objects
  let activeTab = null;
  let badRows = {};          // sheet -> Set of row indices flagged by validation

  // ---- Undo / redo (snapshots of the whole workbook) ---------------------
  let history = [];          // array of deep-cloned workbook states
  let histPtr = -1;          // index of the current state within history
  const HISTORY_MAX = 100;
  const snapshot = () => JSON.parse(JSON.stringify(workbook));
  function resetHistory() { history = [snapshot()]; histPtr = 0; updateUndoButtons(); }
  function pushHistory() {
    history = history.slice(0, histPtr + 1);   // drop any redo branch
    history.push(snapshot());
    if (history.length > HISTORY_MAX) history.shift();
    histPtr = history.length - 1;
    updateUndoButtons();
  }
  function restoreState(state) {
    workbook = JSON.parse(JSON.stringify(state));
    const res = validate(workbook);
    badRows = res.badRows;
    renderValidation(res); renderTabs(); renderSheet(); renderSolverControls();
    updateUndoButtons();
  }
  function undo() { if (histPtr > 0) { histPtr--; restoreState(history[histPtr]); } }
  function redo() { if (histPtr < history.length - 1) { histPtr++; restoreState(history[histPtr]); } }
  function updateUndoButtons() {
    const u = $('btnUndo'), r = $('btnRedo');
    if (u) u.disabled = histPtr <= 0;
    if (r) r.disabled = histPtr >= history.length - 1;
  }

  // ---- Helpers -----------------------------------------------------------
  const $ = (id) => document.getElementById(id);
  const norm = (v) => (v == null ? '' : String(v).trim());
  const up = (v) => norm(v).toUpperCase();

  function splitIds(v) {
    return norm(v).split(/[,;/]+/).map(s => s.trim()).filter(Boolean);
  }

  // ---- Parsing: workbook -> {sheet: rows} --------------------------------
  function rowsFromSheet(ws) {
    // defval:'' keeps empty cells as '' so columns stay aligned.
    return XLSX.utils.sheet_to_json(ws, { defval: '', raw: false });
  }

  // A single table (from a .csv or a paste) — infer which sheet by its headers.
  function singleTable(rows) {
    const headers = rows.length ? Object.keys(rows[0]) : [];
    const match = SHEET_ORDER.find(name =>
      SCHEMA[name].required.every(c => headers.includes(c)) ||
      // lenient: at least the key column present
      (SCHEMA[name].key && headers.includes(SCHEMA[name].key)));
    const out = {};
    out[match || 'Students'] = rows;
    return { match: match || 'Students', workbook: out };
  }

  function parseWorkbook(data, filename) {
    const isCsv = /\.csv$/i.test(filename);
    const wb = XLSX.read(data, { type: isCsv ? 'string' : 'array' });
    if (isCsv) {
      return singleTable(rowsFromSheet(wb.Sheets[wb.SheetNames[0]])).workbook;
    }
    const out = {};
    for (const name of wb.SheetNames) {
      const canonical = SHEET_ORDER.find(s => s.toLowerCase() === name.trim().toLowerCase());
      out[canonical || name] = rowsFromSheet(wb.Sheets[name]);
    }
    return out;
  }

  // Parse rows pasted from Excel / Google Sheets (tab-delimited) or CSV text.
  function parsePasted(text) {
    const body = String(text).replace(/\r\n/g, '\n').replace(/\r/g, '\n').replace(/\n+$/, '');
    if (!body.trim()) return { rows: [], match: null };
    // Excel & Google Sheets copy as tab-separated; fall back to comma.
    const FS = body.split('\n', 1)[0].includes('\t') ? '\t' : ',';
    const wb = XLSX.read(body, { type: 'string', FS });
    const rows = rowsFromSheet(wb.Sheets[wb.SheetNames[0]]);
    return { rows, match: singleTable(rows).match };
  }

  // ---- Validation (spec §5 step 2) ---------------------------------------
  // Returns { errors:[{loc,msg}], warnings:[...], badRows:{sheet:Set} }
  function validate(wb) {
    const errors = [], warnings = [];
    const bad = {}; SHEET_ORDER.forEach(s => bad[s] = new Set());
    const err  = (loc, msg, sheet, ri) => { errors.push({ loc, msg, sheet, ri }); if (sheet) bad[sheet].add(ri); };
    const warn = (loc, msg) => warnings.push({ loc, msg });

    // Sheet presence + column presence
    for (const name of SHEET_ORDER) {
      const rows = wb[name];
      if (!rows) {
        // History/Conflicts may legitimately be empty on a fresh cohort.
        if (name === 'PBLHistory' || name === 'Conflicts') warn(name, 'sheet missing — treated as empty');
        else err(name, 'required sheet is missing');
        continue;
      }
      if (rows.length) {
        const have = new Set(Object.keys(rows[0]));
        for (const col of SCHEMA[name].required) {
          if (!have.has(col)) err(`${name}`, `missing required column "${col}"`);
        }
      }
    }

    const students = wb.Students || [];
    const tutors   = wb.Tutors || [];
    const studentIds = new Set();
    const tutorIds   = new Set();

    // Students
    students.forEach((r, i) => {
      const id = norm(r.StudentID);
      const loc = `Students row ${i + 2}`;
      if (!id) { err(loc, 'blank StudentID', 'Students', i); }
      else if (studentIds.has(id)) { err(loc, `duplicate StudentID "${id}"`, 'Students', i); }
      else studentIds.add(id);
      if (!norm(r.Name)) warn(loc, 'blank Name');
      if (!YN.has(up(r.Imi)))      err(loc, `Imi must be Y/N (got "${norm(r.Imi)}")`, 'Students', i);
      if (!YN.has(up(r.Resident))) err(loc, `Resident must be Y/N (got "${norm(r.Resident)}")`, 'Students', i);
    });

    // Tutors
    tutors.forEach((r, i) => {
      const id = norm(r.TutorID);
      const loc = `Tutors row ${i + 2}`;
      if (!id) { err(loc, 'blank TutorID', 'Tutors', i); }
      else if (tutorIds.has(id)) { err(loc, `duplicate TutorID "${id}"`, 'Tutors', i); }
      else tutorIds.add(id);
      const max = norm(r.MaxStudents);
      if (max && isNaN(Number(max))) err(loc, `MaxStudents must be a number (got "${max}")`, 'Tutors', i);
      if (!YN.has(up(r.CoTutorOK))) warn(loc, `CoTutorOK should be Y/N (got "${norm(r.CoTutorOK)}")`);
    });

    // Cross-refs: LC mentor must be a known tutor
    students.forEach((r, i) => {
      const m = norm(r.LCMentorID);
      if (m && !tutorIds.has(m))
        err(`Students row ${i + 2}`, `LCMentorID "${m}" is not in the Tutors sheet`, 'Students', i);
    });

    // Conflicts
    (wb.Conflicts || []).forEach((r, i) => {
      const a = norm(r.TypeA_ID), b = norm(r.TypeB_ID), kind = norm(r.Kind).toLowerCase();
      const loc = `Conflicts row ${i + 2}`;
      if (!a || !b) { err(loc, 'both TypeA_ID and TypeB_ID are required', 'Conflicts', i); return; }
      if (kind === 'student-student') {
        if (!studentIds.has(a)) err(loc, `"${a}" is not a known student`, 'Conflicts', i);
        if (!studentIds.has(b)) err(loc, `"${b}" is not a known student`, 'Conflicts', i);
      } else if (kind === 'tutor-student') {
        const okAB = tutorIds.has(a) && studentIds.has(b);
        const okBA = tutorIds.has(b) && studentIds.has(a);
        if (!okAB && !okBA)
          err(loc, `tutor-student pair "${a}"/"${b}" must be one tutor and one student`, 'Conflicts', i);
      } else {
        err(loc, `Kind must be "student-student" or "tutor-student" (got "${norm(r.Kind)}")`, 'Conflicts', i);
      }
    });

    // Groups
    (wb.Groups || []).forEach((r, i) => {
      const loc = `Groups row ${i + 2}`;
      const unit = norm(r.Unit);
      if (!UNITS.includes(unit)) err(loc, `Unit must be one of MD1–MD7 (got "${unit}")`, 'Groups', i);
      if (!norm(r.GroupID)) err(loc, 'blank GroupID', 'Groups', i);
      const tids = splitIds(r.TutorIDs);
      if (!tids.length) warn(loc, 'no TutorIDs listed');
      tids.forEach(t => { if (!tutorIds.has(t)) err(loc, `TutorID "${t}" is not in the Tutors sheet`, 'Groups', i); });
    });

    // PBLHistory (referential integrity; missing refs are warnings, not blockers)
    (wb.PBLHistory || []).forEach((r, i) => {
      const loc = `PBLHistory row ${i + 2}`;
      const sid = norm(r.StudentID), tid = norm(r.TutorID);
      if (sid && !studentIds.has(sid)) warn(loc, `StudentID "${sid}" not in Students (stale history?)`);
      if (tid && !tutorIds.has(tid)) warn(loc, `TutorID "${tid}" not in Tutors (stale history?)`);
    });

    return { errors, warnings, badRows: bad };
  }

  // ---- Rendering ---------------------------------------------------------
  let editorOpen = true;         // is the spreadsheet editor expanded under the summary card?
  let lastValidation = null;     // most recent validate() result, for the summary card
  let rosterFilter = '';         // view/edit one class at a time ('' = all classes)

  // Class filter for the roster editor (only meaningful with 2+ cohorts).
  function renderRosterFilter() {
    const cohorts = [...new Set((workbook.Students || []).map(s => norm(s.Cohort)).filter(Boolean))].sort();
    if (cohorts.length && !cohorts.includes(rosterFilter)) rosterFilter = '';   // reset stale filter
    $('rosterFilterBar').classList.toggle('hidden', cohorts.length < 2);
    $('rosterClass').innerHTML = `<option value="">All classes</option>` +
      cohorts.map(c => `<option value="${escapeAttr(c)}"${c === rosterFilter ? ' selected' : ''}>${escapeHtml(c)}</option>`).join('');
  }

  // At-a-glance roster summary with a toggle to expand the full editor.
  function renderSummary(res) {
    lastValidation = res;
    const counts = SHEET_ORDER.map(n => ({ n, c: (workbook[n] || []).length })).filter(x => x.c);
    const nE = res.errors.length, nW = res.warnings.length;
    const status = nE
      ? `<span class="pill err">${nE} to fix</span>`
      : (nW ? `<span class="pill warn">${nW} warning${nW > 1 ? 's' : ''}</span>` : `<span class="pill ok">✓ No problems</span>`);
    const countStr = counts.length
      ? counts.map(x => `<span class="sc-n"><b>${x.c}</b> ${escapeHtml(sheetLabel(x.n).toLowerCase())}</span>`).join(' · ')
      : 'No data yet';
    $('dataSummary').innerHTML =
      `<div class="summary-line">${countStr} &nbsp; ${status}</div>` +
      `<button id="btnEditData" class="ghost" aria-expanded="${editorOpen}">${editorOpen ? 'Hide data ▴' : 'Edit data ▾'}</button>`;
    $('dataSummary').classList.remove('hidden');
    $('editorWrap').classList.toggle('hidden', !editorOpen);
    $('btnEditData').onclick = () => { editorOpen = !editorOpen; renderSummary(lastValidation); };
  }

  function renderValidation(res) {
    const v = $('validation'); v.classList.remove('hidden');
    const nE = res.errors.length, nW = res.warnings.length;
    $('vsummary').innerHTML =
      (nE === 0
        ? `<span class="pill ok">✓ No blocking errors</span>`
        : `<span class="pill err">${nE} error${nE>1?'s':''}</span>`) +
      (nW ? `<span class="pill warn">${nW} warning${nW>1?'s':''}</span>` : '');
    const row = (cls, x) => {
      const loc = (x.sheet)
        ? `<button class="loc loclink" data-sheet="${escapeAttr(x.sheet)}" data-ri="${x.ri}">${escapeHtml(x.loc)}</button>: `
        : `<span class="loc">${escapeHtml(x.loc)}:</span> `;
      return `<div class="issue ${cls}">${loc}${escapeHtml(x.msg)}</div>`;
    };
    $('issues').innerHTML =
      res.errors.map(e => row('err', e)).join('') +
      res.warnings.map(w => row('warn', w)).join('');
  }

  // Jump from a validation error to the offending cell: open Roster, expand the
  // editor, switch to the sheet, clear any class filter, scroll to + flash the row.
  function jumpToError(sheet, ri) {
    showView('roster');
    editorOpen = true; rosterFilter = '';
    if (lastValidation) renderSummary(lastValidation);
    renderRosterFilter();
    activeTab = sheet; renderTabs(); renderSheet();
    const tr = $('sheetView').querySelectorAll('tbody tr')[ri];
    if (tr) { tr.scrollIntoView({ block: 'center', behavior: 'smooth' }); tr.classList.add('flash'); setTimeout(() => tr.classList.remove('flash'), 1500); }
  }

  function renderTabs() {
    const tabs = $('tabs'); tabs.classList.remove('hidden'); tabs.innerHTML = '';
    SHEET_ORDER.forEach(name => {
      const rows = workbook[name] || [];
      const el = document.createElement('div');
      el.className = 'tab' + (name === activeTab ? ' active' : '');
      el.innerHTML = `${escapeHtml(sheetLabel(name))} <span class="count">(${rows.length})</span>`;
      el.onclick = () => { activeTab = name; renderTabs(); renderSheet(); };
      tabs.appendChild(el);
    });
  }

  // Editable sheet grid: text cells are inputs, Y/N columns are toggles,
  // and rows can be added/removed. Edits write straight back into `workbook`.
  function renderSheet() {
    const view = $('sheetView'); view.classList.remove('hidden');
    const sheet = activeTab;
    const rows = workbook[sheet] || (workbook[sheet] = []);
    const cols = SCHEMA[sheet] ? SCHEMA[sheet].required : (rows[0] ? Object.keys(rows[0]) : []);
    const bad = badRows[sheet] || new Set();

    const textCell = (i, c, v) =>
      `<td class="cell-edit"><input class="cell" type="text" data-r="${i}" data-c="${c}" value="${escapeAttr(v)}"></td>`;

    const cell = (r, i, c) => {
      const v = norm(r[c]);
      if (BOOL_COLS.has(c)) {
        const on = up(r[c]) === 'Y';
        return `<td class="cell-edit"><label class="tog"><input type="checkbox" data-r="${i}" data-c="${c}" data-bool="1"${on ? ' checked' : ''}><span class="track"></span></label></td>`;
      }
      if (c === 'ScheduleTag') {
        // A value not in the preset list is a custom one — show it as a text box.
        if (v && !SCHEDULE_TAGS.includes(v)) return textCell(i, c, v);
        const opts = SCHEDULE_TAGS.map(t =>
          `<option value="${escapeAttr(t)}"${t === v ? ' selected' : ''}>${escapeHtml(tagLabel(t))}</option>`).join('') +
          `<option value="${CUSTOM_TAG}">Custom…</option>`;
        return `<td class="cell-edit"><select class="cell tagsel" data-r="${i}" data-c="${c}">${opts}</select></td>`;
      }
      if (c === 'Cohort') {
        // Pick from the cohorts already in the workbook, or add a new one via Custom…
        const known = [...new Set((workbook.Students || []).map(s => norm(s.Cohort)).filter(Boolean))].sort();
        if (v && !known.includes(v)) known.push(v);
        const opts = `<option value=""${v === '' ? ' selected' : ''}>— choose —</option>` +
          known.map(x => `<option value="${escapeAttr(x)}"${x === v ? ' selected' : ''}>${escapeHtml(x)}</option>`).join('') +
          `<option value="${CUSTOM_TAG}">Custom…</option>`;
        return `<td class="cell-edit"><select class="cell tagsel" data-r="${i}" data-c="${c}">${opts}</select></td>`;
      }
      const fk = (FIELD_KINDS[sheet] || {})[c];
      if (fk && fk.enum) return pickCell(i, c, enumOptions(fk.enum, v));
      if (fk && fk.ref)  return pickCell(i, c, refOptions(fk.ref, v));
      return textCell(i, c, v);
    };
    const head = cols.map(c => `<th>${escapeHtml(colLabel(c))}</th>`).join('') + `<th class="actions-col"></th>`;
    // Optional class filter — only for sheets that carry a Cohort column. Keep the
    // ORIGINAL row index (data-r / data-del) so edits + delete hit the right workbook row.
    const hasCohort = (SCHEMA[sheet] ? SCHEMA[sheet].required : []).includes('Cohort');
    const filterCo = (hasCohort && rosterFilter) ? rosterFilter : '';
    const entries = rows.map((r, i) => [r, i]).filter(([r]) => !filterCo || norm(r.Cohort) === filterCo);

    const body = entries.map(([r, i]) =>
      `<tr class="${bad.has(i) ? 'badrow' : ''}">` +
      cols.map(c => cell(r, i, c)).join('') +
      `<td class="actions-cell"><button class="rowdel" data-del="${i}" aria-label="Delete row" title="Delete row">${ICONS.trash}</button></td></tr>`).join('');

    const shown = filterCo ? `${entries.length} of ${rows.length} · class ${escapeHtml(filterCo)}`
                           : `${rows.length} row${rows.length === 1 ? '' : 's'}`;
    view.innerHTML =
      `<div class="sheet-tools"><button id="btnAddRow">+ Add row</button>` +
      `<span class="hint" style="margin:0">${shown} — edit cells directly, toggle Y/N, or paste rows via “Paste rows”.</span></div>` +
      (cols.length
        ? `<table><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table>`
        : `<div class="empty">${sheet} is empty.</div>`);

    view.oninput = (e) => {
      const t = e.target;
      if (t.classList.contains('cell')) workbook[sheet][+t.dataset.r][t.dataset.c] = t.value;
    };
    view.onchange = (e) => {
      const t = e.target;
      if (t.dataset && t.dataset.bool) {
        workbook[sheet][+t.dataset.r][t.dataset.c] = t.checked ? 'Y' : 'N';
        refreshValidation(); pushHistory();
      } else if (t.classList && t.classList.contains('tagsel')) {
        const r = +t.dataset.r, c = t.dataset.c;
        if (t.value === CUSTOM_TAG) {
          // Swap this cell to a free-text box for an off-menu value.
          workbook[sheet][r][c] = '';
          const td = t.closest('td');
          td.innerHTML = `<input class="cell" type="text" data-r="${r}" data-c="${c}" value="" placeholder="custom tag…">`;
          td.querySelector('input').focus();
        } else {
          workbook[sheet][r][c] = t.value;
        }
        refreshValidation(); pushHistory();
      } else if (t.classList && t.classList.contains('pick')) {
        workbook[sheet][+t.dataset.r][t.dataset.c] = t.value;
        refreshValidation(); pushHistory();
      } else if (t.classList && t.classList.contains('cell')) {
        refreshValidation(); pushHistory();   // re-validate + snapshot when a text edit commits (blur/Enter)
      }
    };
    view.onclick = (e) => {
      if (e.target.id === 'btnAddRow') { addRow(); return; }
      const del = e.target.closest && e.target.closest('button.rowdel');
      if (del) {
        const ri = +del.dataset.del;
        const row = workbook[sheet][ri] || {};
        const who = norm(row.Name) || (SCHEMA[sheet].key && norm(row[SCHEMA[sheet].key])) || `row ${ri + 2}`;
        confirmDialog(`Delete ${who} from ${sheetLabel(sheet)}? You can undo this with Ctrl+Z.`, 'Delete').then(ok => {
          if (!ok) return;
          workbook[sheet].splice(ri, 1); renderSheet(); refreshValidation(); pushHistory();
        });
      }
    };
  }

  function addRow() {
    const cols = SCHEMA[activeTab] ? SCHEMA[activeTab].required : [];
    const blank = {}; cols.forEach(c => blank[c] = '');
    // If a class filter is active and this sheet has a Cohort, seed it so the new row shows.
    if (rosterFilter && cols.includes('Cohort')) blank.Cohort = rosterFilter;
    (workbook[activeTab] = workbook[activeTab] || []).push(blank);
    renderSheet(); refreshValidation(); pushHistory();
  }

  // Re-validate after an edit; refresh the summary, tab counts, and row flags
  // in place (without rebuilding inputs, so text-edit focus isn't disturbed).
  function refreshValidation() {
    const res = validate(workbook);
    badRows = res.badRows;
    renderValidation(res);
    renderSummary(res);
    renderRosterFilter();
    renderTabs();
    const bad = badRows[activeTab] || new Set();
    $('sheetView').querySelectorAll('tbody tr').forEach((tr, i) => tr.classList.toggle('badrow', bad.has(i)));
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"]/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c]));
  }
  const escapeAttr = escapeHtml;

  /* =========================================================================
     PHASE 2 — SOLVER (spec §3–4). Pure functions; no DOM. Heuristic:
     domain reduction → greedy seed (most-constrained first) → hill-climbing
     local search over swaps/moves → scorecard. Over-constrained input is not
     fudged: the least-bad placement is kept and the relaxed hard rule flagged.
     ========================================================================= */

  // Adjustable soft-preference weights (spec §3 — must not be hardcoded; UI sliders).
  const SOFT = [
    { key: 'imi',    label: 'Spread Imi Hoʻōla students', def: 10 },
    { key: 'nonres', label: 'Spread non-residents',       def: 4 },
    { key: 'gender', label: 'Gender balance',             def: 3 },
    { key: 'repeat', label: 'Avoid repeat groupmates',    def: 6 },
  ];
  function defaultWeights() { const w = {}; SOFT.forEach(s => w[s.key] = s.def); return w; }

  // Small deterministic PRNG so results are reproducible across restarts/runs.
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      let t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  const pairKey = (a, b) => a < b ? a + '|' + b : b + '|' + a;

  // Index the workbook into fast lookups the solver needs.
  function buildIndex(wb) {
    const studentsById = new Map((wb.Students || []).map(s => [norm(s.StudentID), s]).filter(e => e[0]));
    const tutorsById   = new Map((wb.Tutors   || []).map(t => [norm(t.TutorID),   t]).filter(e => e[0]));
    const ssConf = new Set();   // student-student, normalized pair key
    const tsConf = new Set();   // 'tutorId|studentId'
    (wb.Conflicts || []).forEach(r => {
      const a = norm(r.TypeA_ID), b = norm(r.TypeB_ID), kind = norm(r.Kind).toLowerCase();
      if (!a || !b) return;
      if (kind === 'student-student') ssConf.add(pairKey(a, b));
      else if (kind === 'tutor-student') tsConf.add((tutorsById.has(a) ? a + '|' + b : b + '|' + a));
    });
    return { studentsById, tutorsById, ssConf, tsConf, history: wb.PBLHistory || [] };
  }

  // Prior-unit data for repeat avoidance (excludes the unit being solved, so re-solving
  // the current unit doesn't conflict with its own already-recorded history).
  function priorData(history, unit) {
    const priorTutors = new Map();   // studentId -> Set(tutorId)
    const buckets = new Map();       // 'unit|group' -> [studentId]
    history.forEach(r => {
      const u = norm(r.Unit), sid = norm(r.StudentID), gid = norm(r.GroupID), tid = norm(r.TutorID);
      if (!sid || u === unit) return;
      if (tid) { if (!priorTutors.has(sid)) priorTutors.set(sid, new Set()); priorTutors.get(sid).add(tid); }
      if (gid) { const k = u + '|' + gid; if (!buckets.has(k)) buckets.set(k, []); buckets.get(k).push(sid); }
    });
    const priorMates = new Map();    // studentId -> Set(studentId) who shared a prior group
    const link = (a, b) => { if (!priorMates.has(a)) priorMates.set(a, new Set()); priorMates.get(a).add(b); };
    for (const arr of buckets.values())
      for (let i = 0; i < arr.length; i++)
        for (let j = i + 1; j < arr.length; j++) { link(arr[i], arr[j]); link(arr[j], arr[i]); }
    return { priorTutors, priorMates };
  }

  // This unit's group slots (optionally scoped to one cohort), with parsed co-tutors and a
  // capacity (min of tutor caps, default 6).
  function groupsForUnit(wb, unit, tutorsById, cohort) {
    const co = norm(cohort);
    return (wb.Groups || []).filter(g => norm(g.Unit) === unit && (!co || norm(g.Cohort) === co)).map((g) => {
      const tutors = splitIds(g.TutorIDs);
      const caps = tutors.map(t => { const tt = tutorsById.get(t); const n = tt ? Number(tt.MaxStudents) : NaN;
                                     return isFinite(n) && n > 0 ? n : 6; });
      return { GroupID: norm(g.GroupID), TimeSlot: norm(g.TimeSlot), tutors,
               capacity: caps.length ? Math.min(...caps) : 6 };
    });
  }

  // Schedule fit (spec §3.4, open question §7.5): `Exception:<Day>-AM/PM` binds the student
  // to a group whose TimeSlot matches that AM/PM; other tags (Imi Hoʻōla GA, HOME Project
  // Manager, custom) are treated as informational, not a hard constraint. Easy to tighten here.
  function scheduleFits(student, group) {
    const tag = norm(student.ScheduleTag);
    if (!tag) return true;
    const m = /^exception:\w+-(AM|PM)$/i.exec(tag);
    if (m) return up(group.TimeSlot) === m[1].toUpperCase();
    return true;
  }

  // Placement-independent hard checks (don't depend on who else is in the group).
  // Returns null if OK, else { rule, detail }.
  function staticViolation(student, group, idx) {
    const sid = norm(student.StudentID);
    const lc = norm(student.LCMentorID);
    if (lc && group.tutors.includes(lc)) return { rule: 'LC mentor ≠ tutor', detail: `group tutor is ${sid}'s LC mentor (${lc})` };
    for (const t of group.tutors) if (idx.tsConf.has(t + '|' + sid)) return { rule: 'Tutor–student conflict', detail: `conflicts with tutor ${t}` };
    const pt = idx.prior.priorTutors.get(sid);
    if (pt) for (const t of group.tutors) if (pt.has(t)) return { rule: 'No repeat tutor', detail: `had tutor ${t} in a prior unit` };
    if (!scheduleFits(student, group)) return { rule: 'Schedule fit', detail: `schedule ${norm(student.ScheduleTag)} can't use ${group.GroupID} (${group.TimeSlot})` };
    return null;
  }
  // Student–student conflict with the current members of a group.
  function memberConflict(sid, members, idx) {
    for (const m of members) if (idx.ssConf.has(pairKey(sid, m))) return m;
    return null;
  }

  // Soft-penalty metrics for a full assignment (lower is better).
  function metricsOf(assign, groups, idx) {
    const all = [...idx.studentsById.values()];
    const fFrac = all.length ? all.filter(s => up(s.Gender) === 'F').length / all.length : 0;
    let imiOver = 0, repeatPairs = 0, genderImb = 0;
    const nonResCounts = [];
    assign.forEach((members) => {
      let imi = 0, nonres = 0, fem = 0;
      for (const sid of members) {
        const s = idx.studentsById.get(sid); if (!s) continue;
        if (up(s.Imi) === 'Y') imi++;
        if (up(s.Resident) === 'N') nonres++;
        if (up(s.Gender) === 'F') fem++;
      }
      imiOver += Math.max(0, imi - 1);
      nonResCounts.push(nonres);
      genderImb += Math.abs(fem - fFrac * members.length);
      for (let i = 0; i < members.length; i++)
        for (let j = i + 1; j < members.length; j++) {
          const pm = idx.prior.priorMates.get(members[i]);
          if (pm && pm.has(members[j])) repeatPairs++;
        }
    });
    const totalNon = nonResCounts.reduce((a, b) => a + b, 0);
    const even = groups.length ? Math.ceil(totalNon / groups.length) : 0;
    const nonResSpread = nonResCounts.reduce((a, c) => a + Math.max(0, c - even), 0);
    return { imiOver, nonResSpread, genderImb: Math.round(genderImb * 10) / 10, repeatPairs };
  }
  function penaltyOf(m, w) {
    return w.imi * m.imiOver + w.nonres * m.nonResSpread + w.gender * m.genderImb + w.repeat * m.repeatPairs;
  }

  // Greedy seed: place most-constrained students (fewest legal groups) first.
  // lockMap (studentId -> groupIndex) pins students in place; they're placed first
  // and not reconsidered, so the rest are seeded around them.
  function seed(students, groups, idx, rng, lockMap) {
    const assign = groups.map(() => []);
    const locked = lockMap || new Map();
    for (const [sid, gi] of locked) if (groups[gi]) assign[gi].push(sid);
    const free = students.filter(s => !locked.has(norm(s.StudentID)));
    const dom = new Map();
    for (const s of free) {
      const sid = norm(s.StudentID);
      const d = []; groups.forEach((g, gi) => { if (!staticViolation(s, g, idx)) d.push(gi); });
      dom.set(sid, d);
    }
    const order = free.map(s => norm(s.StudentID))
      .sort((a, b) => (dom.get(a).length - dom.get(b).length) || (rng() - 0.5));
    const violations = [];
    for (const sid of order) {
      const s = idx.studentsById.get(sid);
      const cands = dom.get(sid).filter(gi => assign[gi].length < groups[gi].capacity && !memberConflict(sid, assign[gi], idx));
      if (cands.length) {
        cands.sort((a, b) => (assign[a].length - assign[b].length) || (rng() - 0.5)); // load-balance
        assign[cands[0]].push(sid);
      } else {
        const lb = leastBad(sid, s, assign, groups, idx);
        assign[lb.gi].push(sid);
        violations.push({ studentId: sid, groupId: groups[lb.gi].GroupID, rule: lb.rule, detail: lb.detail });
      }
    }
    return { assign, violations };
  }
  // When no legal group exists, choose the group breaking the fewest hard rules.
  function leastBad(sid, s, assign, groups, idx) {
    let best = { gi: 0, cost: Infinity, rule: 'Capacity', detail: 'all groups full' };
    groups.forEach((g, gi) => {
      const sv = staticViolation(s, g, idx);
      const mc = memberConflict(sid, assign[gi], idx);
      const over = assign[gi].length >= g.capacity;
      const cost = (sv ? 1 : 0) + (mc ? 1 : 0) + (over ? 1 : 0);
      if (cost < best.cost) {
        let rule = 'Capacity', detail = 'group over capacity';
        if (sv) { rule = sv.rule; detail = sv.detail; }
        else if (mc) { rule = 'Student–student conflict'; detail = `conflicts with ${mc}`; }
        best = { gi, cost, rule, detail };
      }
    });
    return best;
  }

  // Hill-climbing local search: random moves/swaps that preserve all hard constraints
  // and lower total soft penalty; snapshot-and-revert on reject. Keep the best seen.
  // Locked students (lockedSids) are never moved or swapped.
  function optimize(seedAssign, groups, idx, w, rng, iters, lockedSids) {
    const locked = lockedSids || new Set();
    let assign = seedAssign.map(a => a.slice());
    let cur = penaltyOf(metricsOf(assign, groups, idx), w);
    let best = assign.map(a => a.slice()), bestP = cur;
    for (let it = 0; it < iters; it++) {
      const gi = Math.floor(rng() * groups.length);
      if (!assign[gi].length) continue;
      const gj = Math.floor(rng() * groups.length);
      if (gj === gi) continue;
      const si = Math.floor(rng() * assign[gi].length);
      const sid = assign[gi][si];
      if (locked.has(sid)) continue;
      const s = idx.studentsById.get(sid);
      const snap = assign.map(a => a.slice());
      let moved = false;
      if (assign[gj].length < groups[gj].capacity && !staticViolation(s, groups[gj], idx) && !memberConflict(sid, assign[gj], idx)) {
        assign[gi].splice(si, 1); assign[gj].push(sid); moved = true;
      } else if (assign[gj].length) {
        const sj = Math.floor(rng() * assign[gj].length);
        const oid = assign[gj][sj], o = idx.studentsById.get(oid);
        if (locked.has(oid)) continue;
        const gjOthers = assign[gj].filter((_, k) => k !== sj);
        const giOthers = assign[gi].filter((_, k) => k !== si);
        if (!staticViolation(s, groups[gj], idx) && !staticViolation(o, groups[gi], idx) &&
            !memberConflict(sid, gjOthers, idx) && !memberConflict(oid, giOthers, idx)) {
          assign[gi][si] = oid; assign[gj][sj] = sid; moved = true;
        }
      }
      if (!moved) continue;
      const p = penaltyOf(metricsOf(assign, groups, idx), w);
      if (p <= cur) { cur = p; if (p < bestP) { bestP = p; best = assign.map(a => a.slice()); } }
      else assign = snap;
    }
    return { assign: best, penalty: bestP };
  }

  // Re-scan a finished assignment and tally remaining HARD-rule breaks per rule.
  // Conflicts are intentionally excluded here — they're surfaced as advisory warnings
  // in the UI (renderResult), not verified as hard pass/fail rules.
  function verifyHard(outGroups, idx) {
    const tally = { 'No repeat tutor': 0, 'Schedule fit': 0, 'LC mentor ≠ tutor': 0 };
    outGroups.forEach(g => {
      const group = { GroupID: g.GroupID, TimeSlot: g.TimeSlot, tutors: g.tutors, capacity: g.capacity };
      g.students.forEach(sid => {
        const s = idx.studentsById.get(sid); if (!s) return;
        const sv = staticViolation(s, group, idx);
        if (sv && tally[sv.rule] != null) tally[sv.rule]++;
      });
    });
    return Object.entries(tally).map(([rule, n]) => ({ rule, ok: n === 0, violations: n }));
  }

  // Top-level solve: many seeded restarts, keep the run with fewest hard relaxations then lowest penalty.
  // `locks` (optional Map studentId -> GroupID) pins students to a group across the re-solve.
  // `cohort` (optional) restricts to one class: only its students and its group slots.
  function solve(wb, unit, weights, locks, cohort) {
    const co = norm(cohort);
    const idx = buildIndex(wb);
    idx.prior = priorData(idx.history, unit);
    const groups = groupsForUnit(wb, unit, idx.tutorsById, co);
    let students = (wb.Students || []).filter(s => norm(s.StudentID));
    if (co) students = students.filter(s => norm(s.Cohort) === co);
    const w = weights || defaultWeights();
    if (!groups.length)
      return { unit, cohort: co, groups: [], violations: [], capacityShortfall: students.length,
               scorecard: null, error: `No groups are defined for ${unit}${co ? ` / ${co}` : ''}. Add rows to the Groups sheet.` };

    // Resolve lock GroupIDs to indices for this unit's groups.
    const gidIndex = new Map(groups.map((g, gi) => [g.GroupID, gi]));
    const lockMap = new Map(), lockedSids = new Set();
    if (locks) for (const [sid, gid] of locks)
      if (gidIndex.has(gid)) { lockMap.set(sid, gidIndex.get(gid)); lockedSids.add(sid); }

    const totalCap = groups.reduce((a, g) => a + g.capacity, 0);
    let bestRun = null;
    const RESTARTS = 12;
    for (let r = 0; r < RESTARTS; r++) {
      const rng = mulberry32(0x9E3779B9 ^ (r * 2654435761));
      const { assign, violations } = seed(students, groups, idx, rng, lockMap);
      const opt = optimize(assign, groups, idx, w, rng, 3000, lockedSids);
      const score = penaltyOf(metricsOf(opt.assign, groups, idx), w);
      if (!bestRun || violations.length < bestRun.violations.length ||
          (violations.length === bestRun.violations.length && score < bestRun.score))
        bestRun = { assign: opt.assign, violations, score };
    }
    const outGroups = groups.map((g, gi) => ({ GroupID: g.GroupID, TimeSlot: g.TimeSlot, tutors: g.tutors,
                                               capacity: g.capacity, students: bestRun.assign[gi].slice() }));
    const metrics = metricsOf(bestRun.assign, groups, idx);
    return { unit, cohort: co, groups: outGroups, violations: bestRun.violations,
             capacityShortfall: Math.max(0, students.length - totalCap),
             scorecard: { hard: verifyHard(outGroups, idx), soft: { ...metrics, totalPenalty: bestRun.score } } };
  }
  let lastResult = null;
  let locked = new Set();      // studentIds pinned in place across a re-solve

  // ---- Solver UI ---------------------------------------------------------
  function renderSolverControls() {
    const units = [...new Set((workbook.Groups || []).map(g => norm(g.Unit)).filter(Boolean))]
      .sort((a, b) => UNITS.indexOf(a) - UNITS.indexOf(b));
    $('unitSel').innerHTML = units.length
      ? units.map(u => `<option value="${escapeAttr(u)}">${escapeHtml(u)}</option>`).join('')
      : `<option value="">(no rows in Groups sheet)</option>`;
    // Class/cohort + unit are pulled from the loaded data (not hardcoded).
    // Show the Class picker whenever any cohort is present so the operator sees which class.
    const cohorts = [...new Set((workbook.Students || []).map(s => norm(s.Cohort)).filter(Boolean))].sort();
    $('cohortField').hidden = cohorts.length < 1;
    $('cohortSel').innerHTML = cohorts.map(c => `<option value="${escapeAttr(c)}">${escapeHtml(c)}</option>`).join('');
    if (!$('weights').dataset.built) {
      $('weights').innerHTML = SOFT.map(s =>
        `<div class="wrow"><span class="wlab">${escapeHtml(s.label)} <b id="wv_${s.key}">${s.def}</b></span>` +
        `<input type="range" min="0" max="20" value="${s.def}" id="w_${s.key}" data-k="${s.key}"></div>`).join('');
      $('weights').dataset.built = '1';
      $('weights').oninput = (e) => { const k = e.target.dataset.k; if (k) $('wv_' + k).textContent = e.target.value; };
    }
    $('solver').classList.remove('hidden');
  }
  function getWeights() {
    const w = {}; SOFT.forEach(s => { const el = $('w_' + s.key); w[s.key] = el ? Number(el.value) : s.def; });
    return w;
  }

  // Render the board + scorecard. Everything (hard flags + soft scores) is recomputed
  // live from res.groups, so manual drag-moves update instantly without a re-solve.
  function renderResult(res) {
    const sc = $('scorecard'), board = $('board');
    if (res.error) {
      sc.innerHTML = `<div class="issue err">${escapeHtml(res.error)}</div>`;
      board.innerHTML = ''; $('boardActions').classList.add('hidden'); return;
    }
    const students = new Map((workbook.Students || []).map(s => [norm(s.StudentID), s]));
    const tutors = new Map((workbook.Tutors || []).map(t => [norm(t.TutorID), norm(t.Name) || norm(t.TutorID)]));
    const nameOf = (id) => { const s = students.get(id); return s ? (norm(s.Name) || id) : id; };

    // Live re-validation against the current board state.
    const idx = buildIndex(workbook);
    idx.prior = priorData(idx.history, res.unit);
    // Hard-rule breaks (red) are verified; conflicts are advisory warnings (amber), not hard-verified.
    const flags = new Map();   // studentId -> { rule, detail } — hard
    const warns = new Map();   // studentId -> { rule, detail } — conflicts
    res.groups.forEach(g => {
      const group = { GroupID: g.GroupID, TimeSlot: g.TimeSlot, tutors: g.tutors, capacity: g.capacity };
      g.students.forEach((sid, i) => {
        const s = idx.studentsById.get(sid);
        const sv = s ? staticViolation(s, group, idx) : null;
        const mc = memberConflict(sid, g.students.filter((_, k) => k !== i), idx);
        if (sv && sv.rule === 'Tutor–student conflict') warns.set(sid, sv);
        else if (sv) flags.set(sid, sv);
        else if (mc) warns.set(sid, { rule: 'Student–student conflict', detail: `grouped with ${nameOf(mc)}` });
      });
    });
    const assignArr = res.groups.map(g => g.students);
    const hardChecks = verifyHard(res.groups, idx);
    const m = metricsOf(assignArr, res.groups, idx);
    const penalty = penaltyOf(m, getWeights());

    const hard = hardChecks.map(h =>
      `<span class="pill ${h.ok ? 'ok' : 'err'}">${h.ok ? '✓' : '✗'} ${escapeHtml(h.rule)}${h.ok ? '' : ` (${h.violations})`}</span>`).join('');
    const card = (label, val, good) =>
      `<div class="sc-card${good ? ' good' : ''}"><div class="sc-val">${val}</div><div class="sc-lab">${escapeHtml(label)}</div></div>`;
    const cards =
      card('Imi Hoʻōla doubled up', m.imiOver, m.imiOver === 0) +
      card('Non-residents over share', m.nonResSpread, m.nonResSpread === 0) +
      card('Gender imbalance', m.genderImb, m.genderImb <= 1) +
      card('Repeat groupmate pairs', m.repeatPairs, m.repeatPairs === 0) +
      card('Total penalty', penalty, penalty === 0);
    const flagList = [...flags.entries()], warnList = [...warns.entries()];
    const conflictRows = (workbook.Conflicts || []).filter(r => norm(r.TypeA_ID) && norm(r.TypeB_ID)).length;
    sc.innerHTML =
      `<div class="sc-hard">${hard}</div><div class="sc-cards">${cards}</div>` +
      (flagList.length
        ? `<div class="issue err"><b>${flagList.length} student(s) break a hard rule:</b> ` +
          flagList.map(([sid, v]) => `${escapeHtml(nameOf(sid))} — ${escapeHtml(v.rule)} (${escapeHtml(v.detail)})`).join('; ') +
          `. Move them, or fix the input and re-solve.</div>`
        : `<div class="issue ok-note">✓ All hard rules satisfied.</div>`) +
      (warnList.length
        ? `<div class="issue warn"><b>${warnList.length} conflict warning(s):</b> ` +
          warnList.map(([sid, v]) => `${escapeHtml(nameOf(sid))} ${escapeHtml(v.detail || v.rule)}`).join('; ') +
          `. Conflicts are advisory — separate them if you can.</div>`
        : (conflictRows ? `<div class="issue ok-note">✓ All ${conflictRows} conflict rule(s) respected.</div>` : '')) +
      (res.capacityShortfall
        ? `<div class="issue warn">${res.capacityShortfall} more student(s) than total seats — add a group or raise a tutor's Max Students.</div>` : '');

    $('boardActions').classList.remove('hidden');
    board.className = 'board';
    board.innerHTML = res.groups.map((g, gi) => {
      const tnames = g.tutors.map(t => tutors.get(t) || t).join(', ') || '—';
      // Keyboard/touch alternative to dragging: a "Move to…" select listing the other groups.
      const moveOpts = res.groups.map((gg, j) => j === gi ? '' :
        `<option value="${j}">${escapeHtml(gg.GroupID)}</option>`).join('');
      const chips = g.students.map(sid => {
        const s = students.get(sid) || {};
        const tags = [up(s.Imi) === 'Y' ? 'Imi Hoʻōla' : '', up(s.Resident) === 'N' ? 'Non-resident' : '',
                      genderLabel(s.Gender), norm(s.ScheduleTag) ? tagLabel(s.ScheduleTag) : ''].filter(Boolean).join(' · ');
        const f = flags.get(sid), wn = warns.get(sid), lk = locked.has(sid);
        const tip = f || wn, nm = norm(s.Name) || sid;
        return `<div class="chip${f ? ' flag' : wn ? ' warn' : ''}${lk ? ' locked' : ''}" draggable="true" data-sid="${escapeAttr(sid)}"` +
          (tip ? ` title="${escapeAttr(tip.rule + ': ' + tip.detail)}"` : '') + `>` +
          `<div class="chip-row"><span class="cname">${escapeHtml(nm)}</span><span class="chip-actions">` +
          `<select class="movesel" data-sid="${escapeAttr(sid)}" aria-label="Move ${escapeAttr(nm)} to another group" title="Move to another group"><option value="">Move…</option>${moveOpts}</select>` +
          `<button class="lockbtn" data-sid="${escapeAttr(sid)}" aria-label="${lk ? 'Locked' : 'Lock in place'}" title="${lk ? 'Locked — kept in place on re-solve' : 'Lock in place'}">${lk ? ICONS.lock : ICONS.unlock}</button></span></div>` +
          (tags ? `<div class="ctags">${escapeHtml(tags)}</div>` : '') + `</div>`;
      }).join('') || `<div class="hint" style="margin:0">drop students here</div>`;
      const over = g.students.length > g.capacity;
      return `<div class="gcol${over ? ' over' : ''}" data-gi="${gi}"><div class="ghead">` +
        `<div class="gid">${escapeHtml(g.GroupID)}</div>` +
        `<div class="gmeta">${escapeHtml(g.TimeSlot || '—')} · seats ${g.capacity}</div>` +
        `<div class="gtutors">${escapeHtml(tnames)}</div></div>` +
        `<div class="gbody" data-gi="${gi}">${chips}</div><div class="gcount">${g.students.length} / ${g.capacity}</div></div>`;
    }).join('');
  }

  // Manual board edits operate on lastResult.groups, then re-render (which re-validates live).
  function moveStudent(sid, toGi) {
    if (!lastResult) return;
    for (const g of lastResult.groups) { const k = g.students.indexOf(sid); if (k >= 0) g.students.splice(k, 1); }
    lastResult.groups[toGi].students.push(sid);
    renderResult(lastResult);
  }
  function toggleLock(sid) { if (locked.has(sid)) locked.delete(sid); else locked.add(sid); renderResult(lastResult); }

  // ---- Workbook build / export -------------------------------------------
  function buildWorkbook(data) {
    const wb = XLSX.utils.book_new();
    for (const name of SHEET_ORDER) {
      const rows = data[name] || [];
      const cols = SCHEMA[name].required;
      // Normalize each row to the canonical column set/order.
      const shaped = rows.map(r => {
        const o = {}; cols.forEach(c => o[c] = r[c] == null ? '' : r[c]); return o;
      });
      const ws = XLSX.utils.json_to_sheet(shaped, { header: cols });
      XLSX.utils.book_append_sheet(wb, ws, name);
    }
    return wb;
  }

  function download(wb, filename) {
    XLSX.writeFile(wb, filename, { compression: true });
  }

  // ---- Phase 4: write the solved assignment back into the workbook --------
  // Pure: from a solve `result` + the workbook, produce the per-unit Results rows
  // and a PBLHistory with this unit's rows replaced (idempotent re-export). A
  // co-tutored group writes one history row per tutor so repeat-avoidance sees all.
  function resultSheets(result, wb) {
    const unit = norm(result.unit);
    const tutorName = new Map((wb.Tutors || []).map(t => [norm(t.TutorID), norm(t.Name)]));
    const studName  = new Map((wb.Students || []).map(s => [norm(s.StudentID), norm(s.Name)]));
    const results = [], history = [];
    result.groups.forEach(g => {
      g.students.forEach(sid => {
        results.push({ Unit: unit, GroupID: g.GroupID, TimeSlot: g.TimeSlot,
          TutorIDs: g.tutors.join('; '), TutorNames: g.tutors.map(t => tutorName.get(t) || t).join('; '),
          StudentID: sid, StudentName: studName.get(sid) || sid });
        (g.tutors.length ? g.tutors : ['']).forEach(t =>
          history.push({ Unit: unit, StudentID: sid, GroupID: g.GroupID, TutorID: t }));
      });
    });
    // Replace only this unit's rows for the students we just placed (so solving one cohort's
    // unit doesn't wipe another cohort's same-unit history); then append the fresh rows.
    const placed = new Set(result.groups.flatMap(g => g.students));
    const mergedHistory = (wb.PBLHistory || [])
      .filter(r => !(norm(r.Unit) === unit && placed.has(norm(r.StudentID)))).concat(history);
    return { results, history: mergedHistory };
  }
  const RESULTS_COLS = ['Unit', 'GroupID', 'TimeSlot', 'TutorIDs', 'TutorNames', 'StudentID', 'StudentName'];

  // Build the export workbook: all canonical sheets (with edits), and — when a clean
  // solve exists — a Results sheet plus this unit's rows appended to PBLHistory.
  function exportWorkbook() {
    const data = {};
    SHEET_ORDER.forEach(n => data[n] = (workbook[n] || []).map(r => ({ ...r })));
    let results = null;
    if (lastResult && !lastResult.error) {
      const sheets = resultSheets(lastResult, workbook);
      results = sheets.results;
      data.PBLHistory = sheets.history;
    }
    const wb = buildWorkbook(data);
    if (results) {
      const shaped = results.map(r => { const o = {}; RESULTS_COLS.forEach(c => o[c] = r[c] == null ? '' : r[c]); return o; });
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(shaped, { header: RESULTS_COLS }), 'Results');
    }
    return wb;
  }

  // Printable / PDF roster (browser print → Save as PDF; fully offline).
  function printRoster() {
    if (!lastResult || lastResult.error) return;
    const tutorName = new Map((workbook.Tutors || []).map(t => [norm(t.TutorID), norm(t.Name)]));
    const studById = new Map((workbook.Students || []).map(s => [norm(s.StudentID), s]));
    const groups = lastResult.groups.map(g => {
      const tut = g.tutors.map(t => tutorName.get(t) || t).join(', ') || '—';
      const lis = g.students.map(sid => {
        const s = studById.get(sid) || {};
        const tags = [up(s.Imi) === 'Y' ? 'Imi Hoʻōla' : '', up(s.Resident) === 'N' ? 'Non-resident' : '',
                      norm(s.ScheduleTag) ? tagLabel(s.ScheduleTag) : ''].filter(Boolean).join(' · ');
        return `<li>${escapeHtml(norm(s.Name) || sid)}${tags ? ` <span class="rtags">— ${escapeHtml(tags)}</span>` : ''}</li>`;
      }).join('');
      return `<section class="rgroup"><h2>${escapeHtml(g.GroupID)} · ${escapeHtml(g.TimeSlot || '—')} · ${escapeHtml(tut)}` +
             ` <span class="rcount">(${g.students.length})</span></h2><ol>${lis}</ol></section>`;
    }).join('');
    $('printRoster').innerHTML = `<h1>PBL Groups — ${escapeHtml(lastResult.unit)}</h1>${groups}`;
    window.print();
  }

  // Shared load pipeline: validate, render the editor, enable export.
  function loadWorkbook(wb, label, focusSheet) {
    workbook = wb;
    const res = validate(workbook);
    badRows = res.badRows;
    activeTab = focusSheet || SHEET_ORDER.find(s => (workbook[s] || []).length) || 'Students';
    $('placeholder').classList.add('hidden');
    editorOpen = true;                // show the data expanded by default
    rosterFilter = '';
    renderValidation(res);
    renderSummary(res);
    renderRosterFilter();
    renderTabs();
    renderSheet();
    renderSolverControls();
    resetHistory();
    $('scorecard').innerHTML = ''; $('board').innerHTML = ''; lastResult = null; locked = new Set();
    $('boardActions').classList.add('hidden');
    $('btnExport').disabled = false;
    if (label) $('loadedName').textContent = label;
    showView('roster');   // loading data brings you to the Roster view
  }

  // ---- Top-level views (Roster / Groups) ---------------------------------
  function showView(v) {
    const tabs = $('appTabs');
    if (tabs.querySelectorAll) tabs.querySelectorAll('.apptab').forEach(b => {
      const on = b.dataset.view === v;
      b.classList.toggle('active', on);
      b.setAttribute('aria-selected', on ? 'true' : 'false');
    });
    $('view-roster').hidden = v !== 'roster';
    $('view-groups').hidden = v !== 'groups';
  }

  // ---- In-app confirmation dialog (returns a Promise<boolean>) ------------
  let _modalResolve = null, _modalReturnFocus = null;
  function confirmDialog(message, okLabel) {
    _modalReturnFocus = document.activeElement;
    $('modalMsg').textContent = message;
    $('modalOk').textContent = okLabel || 'Confirm';
    $('modal').classList.remove('hidden');
    $('modalOk').focus();
    return new Promise(resolve => { _modalResolve = resolve; });
  }
  function closeModal(result) {
    $('modal').classList.add('hidden');
    if (_modalReturnFocus && _modalReturnFocus.focus) _modalReturnFocus.focus();
    _modalReturnFocus = null;
    const r = _modalResolve; _modalResolve = null;
    if (r) r(result);
  }

  // Transient toast for completed actions (Solve / Export / Print).
  let _toastTimer = null;
  function toast(msg) {
    const t = $('toast'); t.textContent = msg; t.classList.add('show');
    if (_toastTimer) clearTimeout(_toastTimer);
    _toastTimer = setTimeout(() => t.classList.remove('show'), 2600);
  }

  // ---- Wiring ------------------------------------------------------------
  // Confirmation modal: buttons, scrim click, Escape.
  $('modalOk').onclick = () => closeModal(true);
  $('modalCancel').onclick = () => closeModal(false);
  $('modal').addEventListener('click', (e) => { if (e.target.id === 'modal') closeModal(false); });
  document.addEventListener('keydown', (e) => {
    if ($('modal').classList.contains('hidden')) return;
    if (e.key === 'Escape') { closeModal(false); return; }
    if (e.key === 'Tab') {   // trap focus between the two dialog buttons
      const f = [$('modalCancel'), $('modalOk')];
      e.preventDefault();
      const i = f.indexOf(document.activeElement);
      f[e.shiftKey ? (i <= 0 ? f.length - 1 : i - 1) : (i >= f.length - 1 ? 0 : i + 1)].focus();
    }
  });

  // Top-level tab switching (Roster / Groups).
  $('appTabs').addEventListener('click', (e) => {
    const tab = e.target.closest && e.target.closest('.apptab');
    if (tab) showView(tab.dataset.view);
  });

  // Roster class filter — view/edit one class year at a time.
  $('rosterClass').onchange = () => { rosterFilter = $('rosterClass').value; renderSheet(); };

  // Jump from a validation error to its cell.
  $('issues').addEventListener('click', (e) => {
    const link = e.target.closest && e.target.closest('.loclink');
    if (link) jumpToError(link.dataset.sheet, +link.dataset.ri);
  });

  // Prefill the editor with the ~80-student demo cohort (freshly generated each time).
  $('btnExample').onclick = () => {
    loadWorkbook(makeExample(), 'Example data (80 students) — edit freely');
  };

  $('btnTemplate').onclick = () => {
    download(buildWorkbook(TEMPLATE), 'PBL_template.xlsx');
  };

  $('fileInput').onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const isCsv = /\.csv$/i.test(file.name);
        const data = isCsv ? ev.target.result : new Uint8Array(ev.target.result);
        loadWorkbook(parseWorkbook(data, file.name), `Loaded: ${file.name}`);
      } catch (err) {
        alert('Could not read this workbook:\n' + err.message);
        console.error(err);
      }
    };
    if (/\.csv$/i.test(file.name)) reader.readAsText(file);
    else reader.readAsArrayBuffer(file);
    e.target.value = ''; // allow re-loading the same file
  };

  // ---- Paste rows (from Excel / Google Sheets) ---------------------------
  $('btnPaste').onclick = () => {
    showView('roster');
    const p = $('pastePanel'); p.classList.toggle('hidden'); $('pasteMsg').textContent = '';
    if (!p.classList.contains('hidden')) $('pasteText').focus();
  };
  $('btnPasteCancel').onclick = () => { $('pastePanel').classList.add('hidden'); };
  $('btnPasteLoad').onclick = () => {
    try {
      const { rows, match } = parsePasted($('pasteText').value);
      if (!rows.length) { $('pasteMsg').textContent = 'No rows found — include a header row.'; return; }
      const wb = workbook || {};
      wb[match] = rows;                       // replace the matched sheet (other sheets kept)
      $('pasteText').value = '';
      $('pastePanel').classList.add('hidden');
      loadWorkbook(wb, `Pasted ${rows.length} row(s) into ${sheetLabel(match)}`, match);
    } catch (err) {
      $('pasteMsg').textContent = 'Could not parse pasted data: ' + err.message;
      console.error(err);
    }
  };

  // ---- Undo / redo -------------------------------------------------------
  $('btnUndo').onclick = undo;
  $('btnRedo').onclick = redo;
  document.addEventListener('keydown', (e) => {
    if (!(e.ctrlKey || e.metaKey) || !workbook) return;
    const k = e.key.toLowerCase();
    // Let a text field / textarea keep its own native undo while being edited.
    const t = e.target, tag = t && t.tagName;
    const editingText = tag === 'TEXTAREA' || (tag === 'INPUT' && (t.type === 'text' || !t.type));
    if (editingText) return;
    if (k === 'z' && !e.shiftKey) { e.preventDefault(); undo(); }
    else if ((k === 'z' && e.shiftKey) || k === 'y') { e.preventDefault(); redo(); }
  });

  // ---- Solve + interactive board -----------------------------------------
  function runSolve(locks) {
    if (!workbook) return;
    const res = validate(workbook);
    if (res.errors.length) {
      $('scorecard').innerHTML = `<div class="issue err">Fix the ${res.errors.length} data error(s) above before solving.</div>`;
      $('board').innerHTML = ''; $('boardActions').classList.add('hidden');
      return;
    }
    try {
      const cohort = $('cohortField').hidden ? '' : $('cohortSel').value;
      lastResult = solve(workbook, $('unitSel').value, getWeights(), locks, cohort);
      renderResult(lastResult);
      if (!lastResult.error) {
        const placed = lastResult.groups.reduce((n, g) => n + g.students.length, 0);
        toast(`Solved ${lastResult.unit}${cohort ? ' · ' + cohort : ''} — ${placed} students placed`);
      }
    } catch (err) {
      $('scorecard').innerHTML = `<div class="issue err">Solve failed: ${escapeHtml(err.message)}</div>`;
      console.error(err);
    }
  }
  $('btnSolve').onclick = () => { locked = new Set(); runSolve(); };   // fresh solve clears locks

  // Re-solve while keeping locked students in their current group.
  $('btnResolve').onclick = () => {
    if (!lastResult) return;
    const locks = new Map();
    lastResult.groups.forEach(g => g.students.forEach(sid => { if (locked.has(sid)) locks.set(sid, g.GroupID); }));
    runSolve(locks);
  };
  $('btnUnlockAll').onclick = () => { if (lastResult) { locked = new Set(); renderResult(lastResult); } };

  // Drag-and-drop + lock toggling on the board (delegated; survives re-renders).
  const boardEl = $('board');
  boardEl.addEventListener('dragstart', (e) => {
    const chip = e.target.closest && e.target.closest('.chip');
    if (chip) { e.dataTransfer.setData('text/plain', chip.dataset.sid); e.dataTransfer.effectAllowed = 'move'; chip.classList.add('dragging'); }
  });
  boardEl.addEventListener('dragend', (e) => { const c = e.target.closest && e.target.closest('.chip'); if (c) c.classList.remove('dragging'); });
  boardEl.addEventListener('dragover', (e) => { const col = e.target.closest && e.target.closest('.gcol'); if (col) { e.preventDefault(); col.classList.add('dragover'); } });
  boardEl.addEventListener('dragleave', (e) => { const col = e.target.closest && e.target.closest('.gcol'); if (col && !col.contains(e.relatedTarget)) col.classList.remove('dragover'); });
  boardEl.addEventListener('drop', (e) => {
    const col = e.target.closest && e.target.closest('.gcol');
    if (!col || !lastResult) return;
    e.preventDefault(); col.classList.remove('dragover');
    const sid = e.dataTransfer.getData('text/plain');
    if (sid) moveStudent(sid, +col.dataset.gi);
  });
  boardEl.addEventListener('click', (e) => {
    const lb = e.target.closest && e.target.closest('.lockbtn');
    if (lb) { e.stopPropagation(); toggleLock(lb.dataset.sid); }
  });
  // Keyboard/touch move (the "Move to…" select on each chip).
  boardEl.addEventListener('change', (e) => {
    const ms = e.target.closest && e.target.closest('.movesel');
    if (ms && ms.value !== '' && lastResult) moveStudent(ms.dataset.sid, +ms.value);
  });

  $('btnExport').onclick = () => {
    if (!workbook) return;
    const solved = lastResult && !lastResult.error;
    const name = solved ? `PBL_${lastResult.unit}_results.xlsx` : 'PBL_export.xlsx';
    download(exportWorkbook(), name);
    toast(solved ? `Exported ${name} (with results + history)` : `Exported ${name}`);
  };
  $('btnPrint').onclick = printRoster;

  // Start with example data loaded so the operator sees a working editor + board
  // immediately. Gated on a real DOM (skipped under the headless test harness).
  if (typeof document !== 'undefined' && document.body) {
    loadWorkbook(makeExample(), 'Example data (80 students) — edit freely');
  }
  </script>
</body>
</html>
